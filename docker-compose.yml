services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: subtext-translator:latest
    container_name: subtext-translator
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
